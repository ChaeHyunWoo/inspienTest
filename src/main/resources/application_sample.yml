spring:
  application:
    name: inspien-eai-service

  # DB 접속 정보
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url:
    username:
    password:
    hikari:
      pool-name: HikariPool-Core
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

# 3. applicant-key, FTP 접속 정보   #
eai:
  applicant-key:
  ftp:
    server:
    port:
    username:
    password:
    base-path:
    fileName:

# 운송 회사 주문 정보 적재 스케줄러 설정
batch:
  shipment:
    fixed-delay: 50000
# 로깅 설정
logging:
  level:
    root: INFO
    com.inspien.assignment: DEBUG
    org.hibernate.SQL: DEBUG